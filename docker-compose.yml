# docker-compose.yml — Orbis CRM

services:
  # ─── Database ─────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: orbis-db
    environment:
      POSTGRES_USER: orbis_user
      POSTGRES_PASSWORD: orbis_password
      POSTGRES_DB: orbis_crm
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbis_user -d orbis_crm"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - orbis-net

  # ─── Cache ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: orbis-redis
    restart: unless-stopped
    networks:
      - orbis-net

  # ─── Backend (Rust API) ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orbis-backend
    # Port NOT exposed to host - only Nginx can reach it internally
    expose:
      - "8000"
    environment:
      APP_NAME: Orbis
      APP_ENV: development
      DATABASE_URL: postgres://orbis_user:orbis_password@db:5432/orbis_crm
      REDIS_URL: redis://redis:6379
      SERVER_PORT: 8000
      JWT_SECRET: your_super_secret_jwt_key_here_override_in_production
      FRONTEND_URL: http://localhost:3000
      RESEND_API_KEY: ""
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - orbis-net

  # ─── Frontend (React / Vite) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # API calls go through Nginx, so frontend hits the same host
        VITE_API_BASE_URL: /api/v1
        VITE_APP_NAME: Orbis
    container_name: orbis-frontend
    # Not exposed to host - only Nginx proxy reaches it
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - orbis-net

  # ─── Nginx Reverse Proxy (single public entry point) ─────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: orbis-nginx
    ports:
      - "3000:80"       # App runs at http://localhost:3000
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - orbis-net

networks:
  orbis-net:
    driver: bridge

volumes:
  pgdata:
