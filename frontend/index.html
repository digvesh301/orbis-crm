<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6366f1" />

    <!-- SEO -->
    <title>Orbis CRM — Enterprise CRM for Growing Teams</title>
    <meta name="description" content="Orbis CRM: Manage contacts, pipeline, emails, and support in one beautiful platform." />

    <!--
      Performance: preconnect to Google Fonts DNS before browser discovers the CSS link.
      Saves ~100-150ms of DNS lookup + TCP handshake on first load.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      Font: Inter — loaded with display=swap so text is visible immediately
      (uses system font while Inter downloads — prevents FOIT/invisible text flash)
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!--
      Preload the main JS entrypoint hint (Vite will inject actual hash)
      This tells the browser to start fetching JS immediately during HTML parse
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
